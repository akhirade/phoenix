<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>study-room-react-supabase</title>
    <script>
      // Prevent theme flash by applying the saved theme before React renders.
      ;(function () {
        try {
          var raw = localStorage.getItem('phoenix-study-room-theme')
          var theme = raw === 'light' ? 'light' : 'dark'
          var root = document.documentElement
          if (theme === 'dark') root.classList.add('dark')
          else root.classList.remove('dark')
          root.style.colorScheme = theme
        } catch (e) {
          // ignore
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      ;(function (l) {
        if (l.search[1] !== '/') return
        var decoded = l.search
          .slice(1)
          .split('&')
          .map(function (s) {
            return s.replace(/~and~/g, '&')
          })
          .join('?')
        window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash)
      })(window.location)
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
